name: Update latest Substack post

on:
  schedule:
    - cron: '30 17 * * *'   # 23:00 IST — after the evening brief publishes
    - cron: '30 4 * * *'    # 10:00 IST — morning catch-up
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest post from Substack RSS
        run: |
          python3 - <<'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET
          req = urllib.request.Request('https://toroiq.substack.com/feed',
                                       headers={'User-Agent': 'Mozilla/5.0'})
          root = ET.fromstring(urllib.request.urlopen(req, timeout=30).read())
          item = root.find('.//item')
          data = {'title': (item.findtext('title') or '').strip(),
                  'link':  (item.findtext('link') or '').strip(),
                  'date':  (item.findtext('pubDate') or '').strip()}
          assert data['title'] and data['link'], 'empty feed item — keeping old latest.json'
          with open('latest.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=1)
              f.write('\n')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet || (git commit -m "latest.json: auto-update from Substack feed" && git push)
